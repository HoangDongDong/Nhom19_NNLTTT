# ============================================
# EduLanguage Center — application.properties
# ============================================

# ---- Database Connection (MySQL) ----
spring.datasource.url=jdbc:mysql://localhost:3306/edulanguage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Connection Pool (HikariCP) ----
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# ============================================
# JPA / Hibernate
# ============================================

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# update = Tự tạo bảng mới nếu chưa có, cập nhật cột khi Entity thay đổi
# KHÔNG xóa dữ liệu cũ.  Để làm sạch DB, chạy lại schema.sql + data.sql thủ công.
spring.jpa.hibernate.ddl-auto=none

# ---- SQL Logging (đẹp ra console) ----
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Hiện tên tham số thay vì dấu ? (yêu cầu hibernate-types hoặc Hibernate 6)
spring.jpa.properties.hibernate.highlight_sql=true

# ---- Lazy Loading & OSIV ----
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ============================================
# Spring SQL Initialization
# ============================================
# Hibernate (ddl-auto=update) tự tạo/cập nhật bảng khi khởi động.
# Spring chỉ cần chạy data.sql để chèn dữ liệu mẫu (sử dụng IF NOT EXISTS).
# defer = true: đảm bảo Hibernate tạo bảng TRƯỚC, rồi mới chạy data.sql.
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sql/schema-mysql.sql,classpath:sql/data-mysql.sql
spring.sql.init.encoding=UTF-8
spring.sql.init.separator=;
spring.jpa.defer-datasource-initialization=true

# ============================================
# Server & Encoding
# ============================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ============================================
# Logging Levels (SQL + Spring)
# ============================================
# Hiện SQL từ Hibernate
logging.level.org.hibernate.SQL=DEBUG
# Hiện giá trị tham số bind
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# Bỏ bớt noise từ Spring Security/Web
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
# Connection pool
logging.level.com.zaxxer.hikari=WARN

# ============================================
# Thymeleaf (tắt cache khi dev)
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
