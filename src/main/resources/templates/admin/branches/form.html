<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${branch.id != null} ? 'Sửa chi nhánh' : 'Thêm chi nhánh'">Chi nhánh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">EduLanguage</a>
            <a href="/admin/branches" class="btn btn-outline-light btn-sm">Danh sách chi nhánh</a>
        </div>
    </nav>
    <main class="container my-4">
        <h4 th:text="${branch.id != null} ? 'Sửa chi nhánh' : 'Thêm chi nhánh'">Chi nhánh</h4>
        <form th:action="@{/admin/branches/save}" th:object="${branch}" method="post" class="card p-4" style="max-width: 500px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label class="form-label">Tên chi nhánh <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{branchName}" required maxlength="100" placeholder="VD: Chi nhánh Quận 1">
                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('branchName')}" th:errors="*{branchName}"></p>
            </div>
            <div class="mb-3">
                <label class="form-label">Địa chỉ</label>
                <input type="text" class="form-control" th:field="*{address}" maxlength="255" placeholder="Địa chỉ">
            </div>
            <div class="mb-3">
                <label class="form-label">Điện thoại</label>
                <input type="text" class="form-control" th:field="*{phone}" maxlength="20" placeholder="Số điện thoại">
            </div>
            <div class="mb-3">
                <label class="form-label">Trạng thái</label>
                <select class="form-select" th:field="*{status}">
                    <option value="">-- Chọn --</option>
                    <option th:each="s : ${statusList}" th:value="${s}" th:text="${s}">ACTIVE</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a th:href="@{/admin/branches}" class="btn btn-outline-secondary">Hủy</a>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
