<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Admin Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Admin Dashboard')}"></header>

<main class="main-content">
    <!-- Thống kê nhanh -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="card stat-card">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="icon-box bg-primary bg-opacity-10 text-primary"><i class="bi bi-people-fill"></i></div>
                    <div>
                        <div class="text-muted small">Học viên</div>
                        <div class="fw-bold fs-4" th:text="${totalStudents}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="icon-box bg-success bg-opacity-10 text-success"><i class="bi bi-journal-check"></i></div>
                    <div>
                        <div class="text-muted small">Ghi danh</div>
                        <div class="fw-bold fs-4" th:text="${totalEnrollments}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="icon-box bg-warning bg-opacity-10 text-warning"><i class="bi bi-receipt-cutoff"></i></div>
                    <div>
                        <div class="text-muted small">Hóa đơn</div>
                        <div class="fw-bold fs-4" th:text="${totalInvoices}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="icon-box bg-info bg-opacity-10 text-info"><i class="bi bi-book-half"></i></div>
                    <div>
                        <div class="text-muted small">Khóa học</div>
                        <div class="fw-bold fs-4" th:text="${totalCourses}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Menu nhanh -->
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h6><i class="bi bi-people text-primary"></i> Nhân viên & Giáo viên</h6>
                    <p class="text-muted small">Quản lý thông tin nhân sự, thêm mới, cập nhật trạng thái.</p>
                    <a th:href="@{/admin/staffs}" class="btn btn-sm btn-outline-primary me-1">Nhân viên</a>
                    <a th:href="@{/admin/teachers}" class="btn btn-sm btn-outline-primary">Giáo viên</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h6><i class="bi bi-book text-success"></i> Khóa học & Phòng học</h6>
                    <p class="text-muted small">Cấu hình chương trình học, đơn giá, phòng học.</p>
                    <a th:href="@{/admin/courses}" class="btn btn-sm btn-outline-success me-1">Khóa học</a>
                    <a th:href="@{/admin/rooms}" class="btn btn-sm btn-outline-success">Phòng học</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h6><i class="bi bi-bar-chart-line text-warning"></i> Báo cáo Tài chính</h6>
                    <p class="text-muted small">Tổng hợp thu chi từ các hóa đơn.</p>
                    <a th:href="@{/admin/reports}" class="btn btn-sm btn-outline-warning">Xem báo cáo</a>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
