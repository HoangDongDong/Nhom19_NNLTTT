<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${promo.id != null ? 'Sửa Mã khuyến mại' : 'Thêm Mã khuyến mại'})}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header(${promo.id != null ? 'Chỉnh sửa Mã khuyến mại' : 'Tạo Mã khuyến mại mới'})}"></header>

<main class="main-content">
    <div class="row justify-content-center mt-4">
        <div class="col-md-10 col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/admin/promos/save}" th:object="${promo}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-4">
                            <h6 class="text-uppercase text-muted mb-3">Thông tin mã</h6>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Mã khuyến mại <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control font-monospace text-uppercase" th:field="*{code}" required 
                                           maxlength="50" placeholder="VD: SUMMER2026" style="letter-spacing: 2px;">
                                    <div class="form-text">Mã sẽ tự động chuyển thành CHỮ IN HOA.</div>
                                    <p class="text-danger small mt-1" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></p>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Trạng thái</label>
                                    <select class="form-select" th:field="*{isActive}">
                                        <option th:value="true">Đang hoạt động</option>
                                        <option th:value="false">Vô hiệu hóa</option>
                                    </select>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label class="form-label fw-bold">Mô tả</label>
                                    <input type="text" class="form-control" th:field="*{description}" 
                                           maxlength="255" placeholder="VD: Ưu đãi khai giảng tháng 9">
                                </div>
                            </div>
                        </div>

                        <div class="mb-4 pt-3 border-top">
                            <h6 class="text-uppercase text-muted mb-3">Mức khuyến mại</h6>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Phần trăm giảm (%) <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" th:field="*{discountPercentage}" 
                                               required min="0" max="100" placeholder="10">
                                        <span class="input-group-text">%</span>
                                    </div>
                                    <p class="text-danger small mt-1" th:if="${#fields.hasErrors('discountPercentage')}" th:errors="*{discountPercentage}"></p>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Giảm tối đa (VNĐ) <span class="text-muted">(Tùy chọn)</span></label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" th:field="*{maxDiscountAmount}" 
                                               min="0" step="1000" placeholder="500000">
                                        <span class="input-group-text">₫</span>
                                    </div>
                                    <div class="form-text">Để trống nếu không giới hạn mức giảm.</div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4 pt-3 border-top">
                            <h6 class="text-uppercase text-muted mb-3">Thời hạn & Giới hạn sử dụng</h6>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Có hiệu lực từ <span class="text-muted">(Tùy chọn)</span></label>
                                    <input type="date" class="form-control" th:field="*{validFrom}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Hết hạn vào <span class="text-muted">(Tùy chọn)</span></label>
                                    <input type="date" class="form-control" th:field="*{validUntil}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Số lượt sử dụng tối đa <span class="text-muted">(Tùy chọn)</span></label>
                                    <input type="number" class="form-control" th:field="*{maxUsages}" min="1" placeholder="100">
                                    <div class="form-text">Để trống nếu không giới hạn số lượt.</div>
                                </div>
                                <div class="col-md-6 mb-3" th:if="${promo.id != null}">
                                    <label class="form-label fw-bold">Đã sử dụng</label>
                                    <input type="text" class="form-control bg-light" th:value="${promo.usageCount + ' lượt'}" disabled>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 border-top pt-3">
                            <a th:href="@{/admin/promos}" class="btn btn-light"><i class="bi bi-x"></i> Hủy</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> 
                                <span th:text="${promo.id != null ? 'Lưu Thay Đổi' : 'Tạo Mã Khuyến Mại'}"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
