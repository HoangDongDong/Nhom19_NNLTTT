<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Báo cáo Tài chính')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Báo cáo Tài chính')}"></header>
<main class="main-content">
    <h5 class="mb-3"><i class="bi bi-bar-chart-line text-warning"></i> Báo cáo tổng hợp Hóa đơn</h5>

    <!-- Thống kê nhanh -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card stat-card border-0">
                <div class="card-body text-center">
                    <div class="text-muted small">Tổng Hóa đơn</div>
                    <div class="fw-bold fs-3 text-primary" th:text="${invoices != null ? #lists.size(invoices) : 0}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card border-0">
                <div class="card-body text-center">
                    <div class="text-muted small">Đã thanh toán</div>
                    <div class="fw-bold fs-3 text-success" th:text="${paidCount}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card border-0">
                <div class="card-body text-center">
                    <div class="text-muted small">Chưa thanh toán</div>
                    <div class="fw-bold fs-3 text-danger" th:text="${unpaidCount}">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bảng chi tiết -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>ID</th><th>Học viên</th><th>Lớp</th><th>Số tiền</th><th>Trạng thái</th><th>Ngày tạo</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="inv : ${invoices}">
                            <td th:text="${inv.id}">-</td>
                            <td th:text="${inv.enrollment?.student?.fullName}">-</td>
                            <td th:text="${inv.enrollment?.clazz?.className}">-</td>
                            <td th:text="${inv.totalAmount != null ? #numbers.formatDecimal(inv.totalAmount, 1, 'COMMA', 0, 'POINT') + ' đ' : '-'}">-</td>
                            <td><span class="badge" th:classappend="${inv.status == 'PAID' ? 'bg-success' : 'bg-danger'}" th:text="${inv.status}">-</span></td>
                            <td th:text="${inv.createdAt}">-</td>
                        </tr>
                        <tr th:if="${invoices == null or #lists.isEmpty(invoices)}">
                            <td colspan="6" class="text-center text-muted py-3">Chưa có dữ liệu.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
