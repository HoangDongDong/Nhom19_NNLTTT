<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách khóa học - EduLanguage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/home">EduLanguage</a>
            <a href="/home" class="btn btn-outline-light btn-sm">Trang chủ</a>
        </div>
    </nav>
    <main class="container my-4">
        <h4>Danh sách khóa học</h4>
        <p class="text-muted">Dữ liệu lấy qua CourseService (mô hình 3 lớp: Controller → Service → Repository).</p>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Tên khóa học</th>
                        <th>Cấp độ</th>
                        <th>Thời lượng (giờ)</th>
                        <th>Học phí</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${courses}">
                        <td th:text="${c.id}">1</td>
                        <td th:text="${c.courseName}">IELTS Foundation</td>
                        <td th:text="${c.level}">Beginner</td>
                        <td th:text="${c.duration}">60</td>
<td th:text="${c.fee != null ? #numbers.formatDecimal(c.fee, 1, 'COMMA', 2, 'POINT') + ' đ' : '-'}">3.500.000 đ</td>
                        <td><span class="badge" th:classappend="${c.status?.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'" th:text="${c.status}">ACTIVE</span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(courses)}">
                        <td colspan="6" class="text-center text-muted">Chưa có khóa học nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <a href="/home" class="btn btn-outline-secondary mt-2">← Về trang chủ</a>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
