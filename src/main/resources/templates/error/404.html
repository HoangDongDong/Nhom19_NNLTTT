<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#1e3a5f,#2d5a87); }
        .error-card { text-align:center; background:#fff; padding:48px; border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,.25); max-width:440px; }
        .error-code { font-size:5rem; font-weight:800; color:#ff9800; line-height:1; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">404</div>
        <h4 class="mt-3">Không tìm thấy trang</h4>
        <p class="text-muted">Đường dẫn bạn truy cập không tồn tại hoặc đã bị thay đổi.</p>
        <a href="/home" class="btn btn-primary mt-2"><i class="bi bi-house-door"></i> Về trang chủ</a>
    </div>
</body>
</html>
