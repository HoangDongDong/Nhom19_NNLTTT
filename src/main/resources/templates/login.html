<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Trung tâm Ngoại ngữ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%); }
        .login-card { max-width: 400px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .card-header { background: #1e3a5f; color: white; font-weight: 600; border-radius: 12px 12px 0 0; padding: 1rem; }
        .btn-login { background: #1e3a5f; border: none; }
        .btn-login:hover { background: #2d5a87; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card">
            <div class="card-header text-center">
                Hệ thống quản lý Trung tâm Ngoại ngữ
            </div>
            <div class="card-body p-4">
                <h5 class="card-title mb-4">Đăng nhập</h5>
                <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Tên đăng nhập</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="admin / teacher1 / student1">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="123">
                    </div>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-primary btn-login w-100">Đăng nhập</button>
                </form>
                <p class="text-muted small mt-3 mb-0">Tài khoản mẫu (sau khi chạy Seed): admin / teacher1 / student1 — mật khẩu: 123</p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
