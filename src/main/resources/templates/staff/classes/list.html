<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý Lớp học')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Danh sách Lớp học')}"></header>

<main class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Danh Sách Lớp Học</h4>
        <a th:href="@{/staff/classes/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Mở Lớp Sinh Lịch
        </a>
    </div>

    <!-- Thông báo kết quả -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm mt-3">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                    <tr>
                        <th class="ps-4">Tên Lớp</th>
                        <th>Khóa học</th>
                        <th>Giáo viên</th>
                        <th>Thời gian</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="clazz : ${classes}">
                        <td class="ps-4 fw-bold" th:text="${clazz.className}"></td>
                        <td th:text="${clazz.course.courseName}"></td>
                        <td th:text="${clazz.teacher.fullName}"></td>
                        <td>
                            <span class="d-block" th:text="${#temporals.format(clazz.startDate, 'dd/MM/yyyy')} + ' - ' + ${#temporals.format(clazz.endDate, 'dd/MM/yyyy')}"></span>
                        </td>
                        <td>
                            <span th:if="${clazz.status.name() == 'PENDING'}" class="badge bg-warning text-dark">Chờ khai giảng</span>
                            <span th:if="${clazz.status.name() == 'ACTIVE'}" class="badge bg-success">Đang học</span>
                            <span th:if="${clazz.status.name() == 'COMPLETED'}" class="badge bg-secondary">Đã xong</span>
                        </td>
                        <td class="text-end pe-4">
                            <a th:href="@{'/staff/classes/' + ${clazz.id}}" class="btn btn-sm btn-info text-white">
                                <i class="bi bi-calendar-week"></i> Xem Lịch & Sửa
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(classes)}">
                        <td colspan="6" class="text-center text-muted py-4">Chưa có lớp học nào trong hệ thống.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
