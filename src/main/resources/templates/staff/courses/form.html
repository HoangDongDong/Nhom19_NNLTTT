<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${course.id != null ? 'Sửa Khóa Học' : 'Thêm Khóa Học'})}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header(${course.id != null ? 'Chỉnh sửa Khóa học' : 'Tạo Khóa học mới'})}"></header>

<main class="main-content">
    <div class="row justify-content-center mt-4">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form th:action="@{/staff/courses/save}" th:object="${course}" method="post">
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên Khóa Học <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{courseName}" required placeholder="Ví dụ: Tiếng Anh Giao Tiếp Cơ Bản">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả Khóa học <span class="text-danger">*</span></label>
                            <textarea class="form-control" th:field="*{description}" rows="3" required placeholder="Nhập mô tả tóm tắt về nội dung khóa học..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Đầu vào / Trình độ <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{level}" required>
                                    <option value="" disabled selected>Chọn trình độ...</option>
                                    <option value="A1">A1 (Beginner)</option>
                                    <option value="A2">A2 (Elementary)</option>
                                    <option value="B1">B1 (Intermediate)</option>
                                    <option value="B2">B2 (Upper Intermediate)</option>
                                    <option value="C1">C1 (Advanced)</option>
                                    <option value="C2">C2 (Proficient)</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Thời lượng (Giờ học) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" th:field="*{duration}" required min="1">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Học Phí (VNĐ) <span class="text-danger">*</span></label>
                                <input type="number" step="1000" class="form-control" th:field="*{fee}" required min="0">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold">Trạng Thái</label>
                                <select class="form-select" th:field="*{status}">
                                    <option th:each="s : ${statusValues}" th:value="${s}" th:text="${s}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 border-top pt-3">
                            <a th:href="@{/staff/courses}" class="btn btn-light"><i class="bi bi-x"></i> Hủy</a>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> 
                                <span th:text="${course.id != null ? 'Lưu Thay Đổi' : 'Tạo Khóa Học'}"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
