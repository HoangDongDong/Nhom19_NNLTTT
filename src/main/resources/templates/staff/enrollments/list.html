<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý Ghi danh')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Quản lý Ghi danh')}"></header>

<main class="main-content">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show"><span th:text="${message}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Danh sách Ghi danh</h5>
        <a th:href="@{/staff/enrollments/new}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Ghi danh mới</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>ID</th><th>Học viên</th><th>Lớp</th><th>Khóa học</th><th>Trạng thái</th><th>Ngày tạo</th><th>Hành động</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${enrollments}">
                            <td th:text="${e.id}">-</td>
                            <td th:text="${e.student?.fullName}">-</td>
                            <td th:text="${e.clazz?.className}">-</td>
                            <td th:text="${e.clazz?.course?.courseName}">-</td>
                            <td><span class="badge" th:classappend="${e.status == 'ACTIVE' ? 'bg-success' : (e.status == 'PENDING' ? 'bg-warning text-dark' : 'bg-secondary')}" th:text="${e.status}">-</span></td>
                            <td th:text="${e.createdAt}">-</td>
                            <td>
                                <form th:if="${e.status == 'PENDING'}" th:action="@{'/staff/enrollments/cancel/' + ${e.id}}" method="post" style="display:inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Xác nhận hủy ghi danh?')"><i class="bi bi-x-circle"></i> Hủy</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(enrollments)}">
                            <td colspan="7" class="text-center text-muted py-3">Chưa có ghi danh nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
