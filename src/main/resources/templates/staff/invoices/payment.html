<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Thanh toán Hóa đơn')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Thanh toán Hóa đơn')}"></header>

<main class="main-content">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 text-primary"><i class="bi bi-credit-card-2-front"></i> Xử lý Thanh toán Hóa đơn #[[${invoice.id}]]</h5>
                </div>
                <div class="card-body p-4">
                    <div class="mb-4 p-3 bg-light rounded">
                        <div class="row">
                            <div class="col-6"><strong>Mã HĐ:</strong> <span th:text="${invoice.id}">-</span></div>
                            <div class="col-6"><strong>Học viên:</strong> <span th:text="${invoice.enrollment?.student?.fullName}">-</span></div>
                            <div class="col-6 mt-2"><strong>Khóa học:</strong> <span th:text="${invoice.enrollment?.clazz?.course?.courseName}">-</span></div>
                            <div class="col-6 mt-2"><strong>Học phí gốc:</strong> <span class="text-danger fw-bold" id="originalAmountDisplay" th:text="${invoice.totalAmount != null ? #numbers.formatDecimal(invoice.totalAmount, 1, 'COMMA', 0, 'POINT') + ' đ' : '-'}">-</span></div>
                            <div class="col-6 mt-2"><strong>Trạng thái:</strong> <span class="badge bg-warning text-dark" th:text="${invoice.status}">-</span></div>
                        </div>
                    </div>

                    <!-- Mã giảm giá -->
                    <div class="mb-4 p-3 border rounded" style="background: #fefce8;">
                        <label class="form-label fw-bold"><i class="bi bi-tags text-warning me-1"></i> Mã khuyến mại</label>
                        <div class="row g-2">
                            <div class="col-md-8">
                                <select id="promoCodeSelect" class="form-select form-select-lg" onchange="onPromoSelectChange()">
                                    <option value="">-- Không dùng mã --</option>
                                    <option th:each="p : ${promoCodes}" th:value="${p.code}" 
                                            th:attr="data-desc=${p.description}"
                                            th:text="${p.code} + ' (Giảm ' + ${p.discountPercentage} + '%)'">WELCOME10 (Giảm 10%)</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <button type="button" id="applyPromoBtn" class="btn btn-warning w-100" onclick="applyPromoFromSelect()">
                                    <i class="bi bi-check2-circle"></i> Áp dụng
                                </button>
                            </div>
                        </div>
                        <small class="text-muted">Hoặc nhập mã thủ công:</small>
                        <div class="input-group mt-1">
                            <input type="text" id="promoCodeInput" class="form-control font-monospace text-uppercase" placeholder="Nhập mã nếu không có trong danh sách">
                            <button type="button" class="btn btn-outline-secondary" onclick="applyPromo()">Áp dụng</button>
                        </div>
                        <div id="promoResult" class="mt-2" style="display:none;"></div>
                        <div id="discountInfo" class="mt-3 p-3 bg-white rounded border-start border-success border-3" style="display:none;">
                            <div class="d-flex justify-content-between mb-1"><span class="text-muted">Học phí gốc:</span><span id="displayOriginal" class="fw-bold"></span></div>
                            <div class="d-flex justify-content-between mb-1 text-success"><span>Khuyến mại:</span><span id="displayDiscount" class="fw-bold">- 0 đ</span></div>
                            <hr class="my-2">
                            <div class="d-flex justify-content-between"><span class="fw-bold">Cần thanh toán:</span><span id="displayFinal" class="fw-bold text-danger fs-5"></span></div>
                        </div>
                    </div>

                    <form th:action="@{/staff/invoices/process}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="invoiceId" th:value="${invoice.id}">
                        <input type="hidden" id="hiddenPromoCode" name="discountCode" value="">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Số tiền thanh toán (VNĐ) <span class="text-danger">*</span></label>
                            <input type="number" id="amountInput" name="amount" class="form-control" th:value="${invoice.totalAmount}" step="1000" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phương thức thanh toán <span class="text-danger">*</span></label>
                            <select name="paymentMethod" class="form-select" required>
                                <option value="">-- Chọn phương thức --</option>
                                <option th:each="m : ${paymentMethods}" th:value="${m.name()}" th:text="${m.name()}" th:selected="${m.name() == 'CASH'}">-</option>
                            </select>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Xác nhận thanh toán</button>
                            <a th:href="@{/staff/invoices}" class="btn btn-outline-secondary">← Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const originalAmount = /*[[${invoice.totalAmount}]]*/ 0;

    function formatVND(num) {
        return new Intl.NumberFormat('vi-VN').format(num) + ' đ';
    }

    function doApplyPromo(code) {
        if (!code) {
            document.getElementById('hiddenPromoCode').value = '';
            document.getElementById('amountInput').value = originalAmount;
            document.getElementById('discountInfo').style.display = 'none';
            document.getElementById('promoCodeSelect').value = '';
            document.getElementById('promoResult').style.display = 'none';
            return;
        }
        const btn = document.getElementById('applyPromoBtn');
        btn.disabled = true;
        fetch('/api/promos/check?code=' + encodeURIComponent(code) + '&amount=' + originalAmount)
            .then(r => r.json())
            .then(data => {
                if (data.valid) {
                    document.getElementById('hiddenPromoCode').value = code.toUpperCase();
                    document.getElementById('amountInput').value = data.finalAmount;
                    document.getElementById('displayOriginal').textContent = formatVND(originalAmount);
                    document.getElementById('displayDiscount').textContent = '- ' + formatVND(data.discountAmount);
                    document.getElementById('displayFinal').textContent = formatVND(data.finalAmount);
                    document.getElementById('discountInfo').style.display = 'block';
                    showPromoResult('✅ Mã <strong>' + code.toUpperCase() + '</strong> đã được áp dụng!', 'success');
                } else {
                    document.getElementById('hiddenPromoCode').value = '';
                    showPromoResult('❌ ' + data.message, 'danger');
                }
            })
            .catch(() => showPromoResult('Lỗi kết nối. Vui lòng thử lại.', 'danger'))
            .finally(() => btn.disabled = false);
    }

    function onPromoSelectChange() {
        const sel = document.getElementById('promoCodeSelect');
        const code = sel.value ? sel.value.trim() : '';
        if (code) doApplyPromo(code);
        else doApplyPromo(null);
    }

    function applyPromoFromSelect() {
        const code = document.getElementById('promoCodeSelect').value?.trim() || '';
        if (code) doApplyPromo(code);
        else doApplyPromo(null);
    }

    function applyPromo() {
        const code = document.getElementById('promoCodeInput').value.trim();
        if (!code) {
            showPromoResult('Vui lòng nhập hoặc chọn mã khuyến mại.', 'danger');
            return;
        }
        doApplyPromo(code);
    }

    function showPromoResult(html, type) {
        const el = document.getElementById('promoResult');
        el.innerHTML = '<div class="alert alert-' + type + ' mb-0">' + html + '</div>';
        el.style.display = 'block';
    }
</script>
</body>
</html>
