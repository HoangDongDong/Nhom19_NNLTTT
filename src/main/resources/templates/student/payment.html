<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Thanh toán Hóa đơn')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Thanh Toán Của Học Viên')}"></header>

<main class="main-content">
    <div class="row justify-content-center mt-3">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white text-center py-3">
                    <h5 class="mb-0 text-primary"><i class="bi bi-wallet2"></i> Thanh toán Hóa đơn #[[${invoice.id}]]</h5>
                </div>
                <div class="card-body p-4">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

                    <div class="mb-4 text-center">
                        <p class="text-muted mb-1">Mã Học viên: <strong class="text-dark" th:text="${invoice.student.id}"></strong></p>
                        <p class="text-muted mb-1">Khóa học: <strong class="text-dark" th:text="${invoice.enrollment.clazz.course.courseName}"></strong></p>
                        <p class="text-muted mb-3">Lớp danh nghĩa: <strong class="text-dark" th:text="${invoice.enrollment.clazz.className}"></strong></p>
                        
                        <div class="p-3 bg-light rounded text-center">
                            <span class="d-block text-muted small text-uppercase">Học phí gốc</span>
                            <h2 id="originalAmount" class="text-dark mb-0" th:text="${#numbers.formatDecimal(invoice.totalAmount, 1, 'COMMA', 0, 'POINT')} + ' VNĐ'"></h2>
                        </div>
                    </div>

                    <!-- Khu vực nhập Mã khuyến mại -->
                    <div class="mb-4 p-3 border rounded" style="background: #fefce8;">
                        <label class="form-label fw-bold mb-2"><i class="bi bi-tags text-warning me-1"></i> Mã khuyến mại</label>
                        <div class="input-group">
                            <input type="text" id="promoCodeInput" class="form-control font-monospace text-uppercase" 
                                   placeholder="Nhập mã khuyến mại (VD: SUMMER2026)" style="letter-spacing:1px;">
                            <button type="button" id="applyPromoBtn" class="btn btn-warning" onclick="applyPromo()">
                                <i class="bi bi-check2-circle"></i> Áp dụng
                            </button>
                        </div>
                        <div id="promoResult" class="mt-2" style="display:none;"></div>
                        
                        <!-- Hiển thị thông tin sau khi áp dụng mã thành công -->
                        <div id="discountInfo" class="mt-3 p-3 bg-white rounded border-start border-success border-3" style="display:none;">
                            <div class="d-flex justify-content-between mb-1">
                                <span class="text-muted">Học phí gốc:</span>
                                <span id="displayOriginal" class="fw-bold"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-1 text-success">
                                <span>Khuyến mại (<span id="discountPercent"></span>):</span>
                                <span id="displayDiscount" class="fw-bold">- 0 VNĐ</span>
                            </div>
                            <hr class="my-2">
                            <div class="d-flex justify-content-between">
                                <span class="fw-bold">Cần thanh toán:</span>
                                <span id="displayFinal" class="fw-bold text-danger fs-5"></span>
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/student/invoices/payment/process}" method="post">
                        <input type="hidden" name="invoiceId" th:value="${invoice.id}">
                        <input type="hidden" name="amount" th:value="${invoice.totalAmount}">
                        <input type="hidden" id="hiddenPromoCode" name="discountCode" value="">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Phương thức thanh toán <span class="text-danger">*</span></label>
                            <select name="paymentMethod" class="form-select" required>
                                <option value="" disabled selected>Chọn hình thức...</option>
                                <option th:each="m : ${paymentMethods}" th:value="${m.name()}" th:text="${m.name()}"></option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary py-2 fw-bold text-uppercase">
                                <i class="bi bi-send-check"></i> Xác nhận gửi yêu cầu
                            </button>
                            <a th:href="@{/student/invoices}" class="btn btn-light py-2">Hủy bỏ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    const originalAmount = /*[[${invoice.totalAmount}]]*/ 0;
    const csrfToken = /*[[${_csrf.token}]]*/ '';
    const csrfHeader = /*[[${_csrf.headerName}]]*/ '';

    function formatVND(num) {
        return new Intl.NumberFormat('vi-VN').format(num) + ' VNĐ';
    }

    function applyPromo() {
        const code = document.getElementById('promoCodeInput').value.trim();
        if (!code) {
            showPromoResult('Vui lòng nhập mã khuyến mại.', 'danger');
            return;
        }

        const btn = document.getElementById('applyPromoBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang kiểm tra...';

        // Gọi API kiểm tra mã
        const headers = { 'Content-Type': 'application/json' };
        headers[csrfHeader] = csrfToken;

        fetch('/api/promos/check?code=' + encodeURIComponent(code) + '&amount=' + originalAmount, {
            method: 'GET',
            headers: headers
        })
        .then(r => r.json())
        .then(data => {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check2-circle"></i> Áp dụng';

            if (data.valid) {
                // Mã hợp lệ
                document.getElementById('hiddenPromoCode').value = code.toUpperCase();
                document.getElementById('displayOriginal').textContent = formatVND(originalAmount);
                document.getElementById('discountPercent').textContent = data.percentage + '%';
                document.getElementById('displayDiscount').textContent = '- ' + formatVND(data.discountAmount);
                document.getElementById('displayFinal').textContent = formatVND(data.finalAmount);
                document.getElementById('discountInfo').style.display = 'block';
                showPromoResult('✅ Mã khuyến mại <strong>' + code.toUpperCase() + '</strong> đã được áp dụng!', 'success');
            } else {
                // Mã không hợp lệ
                document.getElementById('hiddenPromoCode').value = '';
                document.getElementById('discountInfo').style.display = 'none';
                showPromoResult('❌ ' + data.message, 'danger');
            }
        })
        .catch(err => {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check2-circle"></i> Áp dụng';
            showPromoResult('Lỗi kết nối. Vui lòng thử lại.', 'danger');
        });
    }

    function showPromoResult(html, type) {
        const el = document.getElementById('promoResult');
        el.style.display = 'block';
        el.className = 'mt-2 alert alert-' + type + ' py-2 mb-0 small';
        el.innerHTML = html;
    }
</script>
</body>
</html>
