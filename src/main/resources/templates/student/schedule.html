<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Lịch học cá nhân')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Lịch học cá nhân')}"></header>
<main class="main-content">
    <h5 class="mb-3"><i class="bi bi-calendar3 text-primary"></i> Lịch học của tôi</h5>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>Lớp</th><th>Khóa học</th><th>Phòng</th><th>Ngày bắt đầu</th><th>Ngày kết thúc</th><th>Trạng thái</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${enrollments}" th:if="${e.status == 'ACTIVE'}">
                            <td th:text="${e.clazz?.className}">-</td>
                            <td th:text="${e.clazz?.course?.courseName}">-</td>
                            <td th:text="${e.clazz?.room != null ? e.clazz.room.roomName : 'Chưa xếp'}">-</td>
                            <td th:text="${e.clazz?.startDate}">-</td>
                            <td th:text="${e.clazz?.endDate}">-</td>
                            <td><span class="badge bg-success">ACTIVE</span></td>
                        </tr>
                        <tr th:if="${enrollments == null or #lists.isEmpty(enrollments)}">
                            <td colspan="6" class="text-center text-muted py-3">Chưa có lịch học.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
