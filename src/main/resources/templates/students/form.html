<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${student.id != null} ? 'Sửa học viên' : 'Thêm học viên'">Học viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.navbar { background: #1e3a5f !important; }</style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">EduLanguage</a>
            <a href="/students" class="btn btn-outline-light btn-sm">Danh sách học viên</a>
        </div>
    </nav>

    <main class="container my-4">
        <h4 th:text="${student.id != null} ? 'Sửa học viên' : 'Thêm học viên'">Học viên</h4>

        <form th:action="@{/students/save}" th:object="${student}" method="post" class="card p-4 shadow-sm" style="max-width: 600px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{fullName}" required maxlength="100" placeholder="VD: Nguyễn Văn A">
                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
            </div>

            <div class="mb-3">
                <label class="form-label">Ngày sinh</label>
                <input type="date" class="form-control" th:field="*{dateOfBirth}">
                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></p>
            </div>

            <div class="mb-3">
                <label class="form-label">Giới tính</label>
                <select class="form-select" th:field="*{gender}">
                    <option value="">-- Chọn --</option>
                    <option th:each="g : ${genderList}" th:value="${g}" th:text="${g}">MALE</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{phone}" maxlength="20" placeholder="VD: 0912345678">
                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" maxlength="100" placeholder="VD: nguyenvana@gmail.com">
                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>

            <div class="mb-3">
                <label class="form-label">Địa chỉ</label>
                <input type="text" class="form-control" th:field="*{address}" maxlength="255" placeholder="Địa chỉ">
            </div>

            <div class="mb-3">
                <label class="form-label">Trạng thái</label>
                <select class="form-select" th:field="*{status}">
                    <option value="">-- Chọn --</option>
                    <option th:each="s : ${statusList}" th:value="${s}" th:text="${s}">ACTIVE</option>
                </select>
            </div>

            <hr>
            <h6 class="text-muted mb-3">Tài khoản đăng nhập</h6>
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập <span class="text-muted">(Tùy chọn)</span></label>
                <input type="text" class="form-control" name="username" th:value="${currentUsername}" placeholder="Ví dụ: nguyenvana123">
            </div>
            <div class="mb-3">
                <label class="form-label">Mật khẩu <span th:if="${currentUsername != null}" class="text-muted">(Để trống nếu không đổi)</span></label>
                <input type="password" class="form-control" name="password" placeholder="Mật khẩu mới">
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Lưu</button>
                <a th:href="@{/students}" class="btn btn-outline-secondary">Hủy</a>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
