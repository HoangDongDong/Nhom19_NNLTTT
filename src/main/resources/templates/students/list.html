<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Học viên - EduLanguage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background: #1e3a5f !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">EduLanguage</a>
            <div>
                <a href="/home" class="btn btn-outline-light btn-sm me-2">Trang chủ</a>
                <a href="/students" class="btn btn-outline-light btn-sm">Quản lý Học viên</a>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Quản lý Học viên</h4>
            <a th:href="@{/students/new}" class="btn btn-primary">+ Thêm học viên</a>
        </div>

        <!-- Thông báo -->
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Bảng danh sách -->
        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Họ tên</th>
                            <th>Email</th>
                            <th>SĐT</th>
                            <th>Trạng thái</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${students}">
                            <td th:text="${s.id}">1</td>
                            <td th:text="${s.fullName}">Nguyễn Văn A</td>
                            <td th:text="${s.email}">a@email.com</td>
                            <td th:text="${s.phone}">091xxx</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${s.status != null and s.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${s.status}">ACTIVE</span>
                            </td>
                            <td class="text-center text-nowrap">
                                <a th:href="@{/students/edit/{id}(id=${s.id})}" class="btn btn-sm btn-outline-primary">Sửa</a>
                                <a th:href="@{/students/placement-test/{id}(id=${s.id})}" class="btn btn-sm btn-outline-success">Test</a>
                                <form th:action="@{/students/delete/{id}(id=${s.id})}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Xóa học viên này?');">Xóa</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${students == null or students.isEmpty()}">
                            <td colspan="6" class="text-center text-muted py-4">Chưa có học viên nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <a href="/home" class="btn btn-outline-secondary mt-3">← Về trang chủ</a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
