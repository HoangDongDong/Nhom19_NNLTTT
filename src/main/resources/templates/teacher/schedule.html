<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Lịch dạy')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Lịch dạy')}"></header>
<main class="main-content">
    <h5 class="mb-3"><i class="bi bi-calendar3 text-primary"></i> Lịch dạy theo tuần</h5>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>Lớp</th><th>Khóa học</th><th>Phòng</th><th>Bắt đầu</th><th>Kết thúc</th><th>Trạng thái</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${myClasses}">
                            <td th:text="${c.className}">-</td>
                            <td th:text="${c.course?.courseName}">-</td>
                            <td th:text="${c.room != null ? c.room.roomName : 'Chưa xếp'}">-</td>
                            <td th:text="${c.startDate}">-</td>
                            <td th:text="${c.endDate}">-</td>
                            <td><span class="badge" th:classappend="${c.status?.name() == 'ACTIVE' ? 'bg-success' : 'bg-secondary'}" th:text="${c.status}">-</span></td>
                        </tr>
                        <tr th:if="${myClasses == null or #lists.isEmpty(myClasses)}">
                            <td colspan="6" class="text-center text-muted py-3">Chưa có lịch dạy.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
