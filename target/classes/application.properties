# ============================================
# Kết nối SQL Server - Hệ thống trung tâm ngoại ngữ
# ============================================

# SQL Server (đổi localhost / port / tên DB nếu cần)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=EduLanguageCenter;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=1234
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection pool (HikariCP - mặc định Spring Boot)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
# Bật show-sql=true khi debug SQL; tắt để log gọn hơn khi seed/test
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Optional: đổi port ứng dụng
# server.port=8080
