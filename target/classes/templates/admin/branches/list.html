<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi nhánh - Hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">EduLanguage</a>
            <a href="/admin" class="btn btn-outline-light btn-sm">Quản trị</a>
            <a href="/home" class="btn btn-outline-light btn-sm">Trang chủ</a>
        </div>
    </nav>
    <main class="container my-4">
        <h4>Chi nhánh</h4>
        <p th:if="${message}" class="alert alert-success" th:text="${message}"></p>
        <p th:if="${error}" class="alert alert-danger" th:text="${error}"></p>
        <a th:href="@{/admin/branches/new}" class="btn btn-primary mb-3">Thêm chi nhánh</a>
        <div class="table-responsive">
            <table class="table table-striped">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Tên chi nhánh</th>
                        <th>Địa chỉ</th>
                        <th>Điện thoại</th>
                        <th>Trạng thái</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${branches}">
                        <td th:text="${b.id}">1</td>
                        <td th:text="${b.branchName}">Chi nhánh 1</td>
                        <td th:text="${b.address}">-</td>
                        <td th:text="${b.phone}">-</td>
                        <td>
                            <span class="badge" th:classappend="${b.status?.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'" th:text="${b.status}">ACTIVE</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/branches/edit/{id}(id=${b.id})}" class="btn btn-sm btn-outline-primary">Sửa</a>
                            <form th:action="@{/admin/branches/delete/{id}(id=${b.id})}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Xóa chi nhánh này?');">Xóa</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(branches)}">
                        <td colspan="6" class="text-center text-muted">Chưa có chi nhánh nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <a href="/admin" class="btn btn-outline-secondary mt-2">← Về quản trị</a>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
