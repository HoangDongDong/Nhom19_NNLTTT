<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${room.id != null} ? 'Sửa phòng học' : 'Thêm phòng học'">Phòng học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">EduLanguage</a>
            <a href="/admin/rooms" class="btn btn-outline-light btn-sm">Danh sách phòng học</a>
        </div>
    </nav>
    <main class="container my-4">
        <h4 th:text="${room.id != null} ? 'Sửa phòng học' : 'Thêm phòng học'">Phòng học</h4>
        <form th:action="@{/admin/rooms/save}" th:object="${room}" method="post" class="card p-4" style="max-width: 500px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label class="form-label">Tên phòng <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{roomName}" required maxlength="50" placeholder="VD: Phòng A101">
                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('roomName')}" th:errors="*{roomName}"></p>
            </div>
            <div class="mb-3">
                <label class="form-label">Sức chứa</label>
                <input type="number" class="form-control" th:field="*{capacity}" min="1" placeholder="VD: 30">
                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></p>
            </div>
            <div class="mb-3">
                <label class="form-label">Vị trí</label>
                <input type="text" class="form-control" th:field="*{location}" maxlength="100" placeholder="VD: Tầng 1 - Tòa A">
            </div>
            <div class="mb-3">
                <label class="form-label">Trạng thái</label>
                <select class="form-select" th:field="*{status}">
                    <option value="">-- Chọn --</option>
                    <option th:each="s : ${statusList}" th:value="${s}" th:text="${s}">ACTIVE</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a th:href="@{/admin/rooms}" class="btn btn-outline-secondary">Hủy</a>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
