<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${staff.id != null} ? 'Sửa nhân viên' : 'Thêm nhân viên'">Nhân viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/home">EduLanguage</a>
            <a href="/admin/staffs" class="btn btn-outline-light btn-sm">Danh sách nhân viên</a>
        </div>
    </nav>
    <main class="container my-4">
        <h4 th:text="${staff.id != null} ? 'Sửa nhân viên' : 'Thêm nhân viên'">Nhân viên</h4>
        <form th:action="@{/admin/staffs/save}" th:object="${staff}" method="post" class="card p-4" style="max-width: 500px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{fullName}" required maxlength="100" placeholder="Họ và tên">
                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" maxlength="100" placeholder="email@example.com">
                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>
            <div class="mb-3">
                <label class="form-label">Điện thoại</label>
                <input type="text" class="form-control" th:field="*{phone}" maxlength="20" placeholder="Số điện thoại">
            </div>
            <div class="mb-3">
                <label class="form-label">Vai trò</label>
                <select class="form-select" th:field="*{role}">
                    <option value="">-- Chọn --</option>
                    <option th:each="r : ${roleList}" th:value="${r}" th:text="${r}">STAFF</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a th:href="@{/admin/staffs}" class="btn btn-outline-secondary">Hủy</a>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
