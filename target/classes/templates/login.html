<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - EduLanguage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #1d4ed8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }

        .login-subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1rem;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 11px 14px 11px 42px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #1e293b;
            background: #f8fafc;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .input-wrapper input:focus {
            border-color: #3b82f6;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .input-wrapper input::placeholder {
            color: #b0bec5;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            margin-top: 8px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        .btn-submit:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: none;
            opacity: 1;
        }

        .divider {
            border: none;
            border-top: 1px solid #f0f0f0;
            margin: 24px 0 20px;
        }

        .demo-box {
            background: #f8fafc;
            border: 1px solid #e8edf3;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 0.8rem;
            color: #64748b;
            line-height: 1.8;
        }

        .demo-box code {
            background: #e2e8f0;
            color: #1e40af;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.78rem;
        }

        .alert-box {
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <!-- Logo -->
        <div class="brand-logo">
            <i class="bi bi-mortarboard-fill"></i>
        </div>

        <div class="login-title">Đăng nhập</div>
        <div class="login-subtitle">Hệ thống quản lý Trung tâm Ngoại ngữ</div>

        <!-- Thông báo -->
        <div th:if="${message}" class="alert-box alert alert-success py-2" th:text="${message}"></div>
        <div th:if="${error}" class="alert-box alert alert-danger py-2" th:text="${error}"></div>

        <!-- Form -->
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-group">
                <label for="username"><i class="bi bi-person me-1"></i>Tên đăng nhập</label>
                <div class="input-wrapper">
                    <i class="bi bi-person"></i>
                    <input type="text" id="username" name="username" autofocus required
                        placeholder="Nhập tên đăng nhập">
                </div>
            </div>

            <div class="form-group">
                <label for="password"><i class="bi bi-lock me-1"></i>Mật khẩu</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu">
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
            </button>
        </form>

        <hr class="divider">

        <div class="demo-box">
            <strong><i class="bi bi-info-circle text-primary me-1"></i>Tài khoản demo</strong><br>
            Quản trị: <code>admin</code> &nbsp; Nhân viên: <code>staff1</code><br>
            Giáo viên: <code>teacher1</code> &nbsp; Học viên: <code>student1</code><br>
            Mật khẩu chung: <code>123</code>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
