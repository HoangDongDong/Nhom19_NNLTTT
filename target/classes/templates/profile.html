<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Hồ sơ cá nhân')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Hồ sơ cá nhân')}"></header>

<main class="main-content">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row justify-content-center mt-3">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm text-center pt-4 pb-2 mb-4">
                <div class="d-flex justify-content-center mb-3">
                    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px; font-size: 2.5rem;">
                        <i class="bi bi-person"></i>
                    </div>
                </div>
                <h4 class="mb-1" th:text="${userFullName != null ? userFullName : account.username}">User Name</h4>
                <p class="text-muted mb-0">
                    <span class="badge bg-secondary" th:text="${account.role.name()}">ROLE</span>
                </p>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h6 class="text-uppercase text-muted mb-4">Cập nhật thông tin liên hệ</h6>
                    <form th:action="@{/profile/update}" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên đăng nhập (Username)</label>
                            <input type="text" class="form-control bg-light" th:value="${account.username}" disabled>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Họ và Tên</label>
                            <input type="text" class="form-control bg-light" th:value="${userFullName}" disabled>
                            <div class="form-text text-muted">Vui lòng liên hệ bộ phận Học vụ nếu cần đổi tên.</div>
                        </div>

                        <!-- Các trường riêng theo từng Role hiển thị chỉ đọc nếu có -->
                        <div class="mb-3" th:if="${userSpecialty != null}">
                            <label class="form-label fw-bold">Chuyên môn giảng dạy</label>
                            <input type="text" class="form-control bg-light" th:value="${userSpecialty}" disabled>
                        </div>
                        <div class="mb-3" th:if="${userDepartment != null}">
                            <label class="form-label fw-bold">Phòng ban</label>
                            <input type="text" class="form-control bg-light" th:value="${userDepartment}" disabled>
                        </div>

                        <hr class="my-4">

                        <!-- Các cột cho phép chỉnh sửa -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Địa chỉ Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" name="email" th:value="${userEmail}" required placeholder="Email liên lạc chính xác">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" name="phone" th:value="${userPhone}" required placeholder="Số điện thoại di động">
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Cập nhật thông tin</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card border-0 shadow-sm mt-4">
                <div class="card-body p-4">
                    <h6 class="text-uppercase text-muted mb-4">Đổi mật khẩu truy cập</h6>
                    <form th:action="@{/profile/change-password}" method="post">
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Mật khẩu hiện tại <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="oldPassword" required placeholder="Nhập mật khẩu cũ">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mật khẩu mới <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="newPassword" required placeholder="Ít nhất 6 ký tự">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Nhập lại mật khẩu mới <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="confirmPassword" required placeholder="Xác nhận mật khẩu">
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-warning"><i class="bi bi-key"></i> Đổi mật khẩu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
