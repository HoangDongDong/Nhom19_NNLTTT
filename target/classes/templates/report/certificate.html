<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chứng chỉ hoàn thành</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #e9ecef; display: flex; justify-content: center; padding: 20px; }
        .cert-container {
            width: 800px; height: 560px; background: white; position: relative;
            border: 20px solid #2c3e50; padding: 20px; box-sizing: border-box;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600"><rect fill="%23fcfcfc" width="800" height="600"/><circle cx="400" cy="300" r="250" fill="%23f5f5f5"/></svg>');
            background-size: cover; z-index: 1;
        }
        .cert-border-inner { border: 2px dashed #bdc3c7; height: 100%; position: relative; z-index: 2; padding: 30px; }
        h1 { color: #f39c12; font-family: 'Pinyon Script', cursive; font-size: 55px; margin: 0; }
        h2 { color: #2c3e50; font-size: 20px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px; }
        .student-name { font-family: 'Pinyon Script', cursive; font-size: 45px; color: #34495e; border-bottom: 1px solid #bdc3c7; display: inline-block; min-width: 400px; padding-bottom: 5px; margin: 20px 0; }
        p { color: #7f8c8d; font-size: 16px; margin: 10px 0; }
        .course-name { font-size: 24px; color: #2c3e50; font-weight: bold; margin: 20px 0; text-transform: uppercase; }
        .footer { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; font-size: 14px; font-weight: bold; color: #2c3e50; }
        .signature { border-top: 1px solid #7f8c8d; padding-top: 10px; min-width: 150px; text-align: center;}
        .grade-badge { background: #f39c12; color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; font-size: 14px; transform: rotate(-5deg); margin-top: 10px; }
        .no-print { position: fixed; top: 20px; right: 20px; z-index: 999; }
        .btn { padding: 10px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; }
        @media print { body { background: white; margin: 0; padding: 0; } .cert-container { border: 15px solid #2c3e50; box-shadow: none; width: 100%; height: auto; min-height: 90vh;} .no-print { display: none; } @page { size: landscape; } }
    </style>
</head>
<body>
    <div class="no-print">
        <button class="btn" onclick="window.print()">In Chứng Chỉ</button>
    </div>

    <div class="cert-container">
        <div class="cert-border-inner">
            <h2>Trung tâm Ngoại ngữ EduLanguage</h2>
            <h1>Certificate of Completion</h1>
            <p>This is to proudly certify that</p>
            
            <div class="student-name" th:text="${enrollment.student.fullName}">Nguyễn Văn A</div>
            
            <p>has successfully completed the course</p>
            <div class="course-name" th:text="${enrollment.clazz.course.courseName}">TIẾNG ANH GIAO TIẾP A1</div>
            
            <p>with an outstanding performance grade:</p>
            <div class="grade-badge" th:text="'Grade: ' + ${result.grade}">Grade: A</div>

            <div class="footer">
                <div>
                    <span th:text="${#temporals.format(result.createdAt, 'dd/MM/yyyy')}">15/05/2026</span><br>
                    <div class="signature">Date</div>
                </div>
                <div>
                    <span style="font-family: 'Pinyon Script', cursive; font-size: 24px;">Director</span><br>
                    <div class="signature">Center Director</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
