<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Chi tiết Lớp học & Lịch học')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Quản lý Buổi Học (Schedule)')}"></header>

<main class="main-content">
    <div class="mb-4 d-flex align-items-center">
        <a th:href="@{/staff/classes}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i> Trở về</a>
        <h4 class="mb-0">Khóa: <span th:text="${clazz.className}" class="text-primary"></span></h4>
    </div>

    <!-- Thông báo kết quả -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row mb-4">
        <!-- Thông tin lớp học -->
        <div class="col-md-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white fw-bold"><i class="bi bi-info-circle text-info"></i> Thông tin Lớp</div>
                <div class="card-body">
                    <p class="mb-1 text-muted small">Cấp độ (Khóa học):</p>
                    <p class="fw-bold" th:text="${clazz.course.courseName}"></p>
                    <p class="mb-1 text-muted small">Giảng viên:</p>
                    <p class="fw-bold" th:text="${clazz.teacher.fullName}"></p>
                    <p class="mb-1 text-muted small">Phòng mặc định:</p>
                    <p class="fw-bold" th:text="${clazz.room.roomName}"></p>
                    <hr>
                    <p class="mb-1 text-muted small">Khai giảng - Bế giảng:</p>
                    <p class="fw-bold text-success" th:text="${#temporals.format(clazz.startDate, 'dd/MM/yyyy')} + ' ➔ ' + ${#temporals.format(clazz.endDate, 'dd/MM/yyyy')}"></p>
                </div>
            </div>
        </div>

        <!-- Lịch trình chi tiết -->
        <div class="col-md-8">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-bold"><i class="bi bi-calendar-check text-success"></i> Danh sách Buổi học dự kiến (<span th:text="${#lists.size(schedules)}">0</span>)</span>
                    <button class="btn btn-sm btn-outline-primary"><i class="bi bi-plus"></i> Thêm buổi thủ công</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light sticky-top">
                            <tr>
                                <th class="ps-3">Buổi #</th>
                                <th>Ngày học</th>
                                <th>Thời gian</th>
                                <th>Phòng học</th>
                                <th class="text-end pe-3">Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="schedule, stat : ${schedules}">
                                <td class="ps-3" th:text="${stat.count}"></td>
                                <td class="fw-bold text-primary">
                                    <span th:text="${#temporals.format(schedule.date, 'EEEE')}"></span><br>
                                    <span class="small text-muted" th:text="${#temporals.format(schedule.date, 'dd/MM/yyyy')}"></span>
                                </td>
                                <td><span th:text="${schedule.startTime}"></span> - <span th:text="${schedule.endTime}"></span></td>
                                <td><span class="badge bg-info" th:text="${schedule.room.roomName}"></span></td>
                                <td class="text-end pe-3">
                                    <button class="btn btn-sm btn-light border" 
                                            th:attr="onclick=|openEditModal('${schedule.id}', '${schedule.date}', '${schedule.startTime}', '${schedule.endTime}', '${schedule.room.id}')|">
                                        <i class="bi bi-pencil"></i> Sửa
                                    </button>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(schedules)}">
                                <td colspan="5" class="text-center py-4 text-muted">
                                    Lớp chưa được sinh lịch học.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Modal Sửa Buổi Học -->
<div class="modal fade" id="editScheduleModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="editScheduleForm" method="post" action="">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cập nhật Buổi học</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <label class="form-label">Ngày học mới</label>
                        <input type="date" name="date" id="editDate" class="form-control" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label">Bắt đầu</label>
                            <input type="time" name="startTime" id="editStartTime" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Kết thúc</label>
                            <input type="time" name="endTime" id="editEndTime" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Đổi Phòng học (Ngoại lệ)</label>
                        <select name="roomId" id="editRoomId" class="form-select" required>
                            <option th:each="r : ${rooms}" th:value="${r.id}" th:text="${r.roomName} + ' (Chứa: ' + ${r.capacity} + ')'"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="submit" class="btn btn-primary">Lưu Thay Đổi</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function openEditModal(scheduleId, date, startTime, endTime, roomId) {
        document.getElementById('editScheduleForm').action = '/staff/classes/[[${clazz.id}]]/schedule/' + scheduleId + '/edit';
        document.getElementById('editDate').value = date;
        document.getElementById('editStartTime').value = startTime;
        document.getElementById('editEndTime').value = endTime;
        document.getElementById('editRoomId').value = roomId;
        
        var editModal = new bootstrap.Modal(document.getElementById('editScheduleModal'));
        editModal.show();
    }
</script>
</body>
</html>
