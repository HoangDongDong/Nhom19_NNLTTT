<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý Khóa học')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Quản lý Khóa học')}"></header>

<main class="main-content">
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Danh sách Khóa học</h5>
        <a th:href="@{/staff/courses/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Thêm Khóa Mới
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Tên Khóa Học</th>
                            <th>Trình Độ</th>
                            <th>Thời lượng</th>
                            <th>Học Phí</th>
                            <th>Trạng thái</th>
                            <th class="text-end">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="course : ${courses}">
                            <td><strong class="text-primary" th:text="${course.courseName}"></strong></td>
                            <td><span class="badge bg-secondary" th:text="${course.level}"></span></td>
                            <td th:text="${course.duration} + ' Giờ'"></td>
                            <td th:text="${#numbers.formatDecimal(course.fee, 1, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            <td>
                                <span class="badge" th:classappend="${course.status.name() == 'ACTIVE' ? 'bg-success' : 'bg-danger'}" th:text="${course.status.name()}"></span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{'/staff/courses/edit/' + ${course.id}}" class="btn btn-sm btn-outline-primary" title="Chỉnh sửa">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{'/staff/courses/delete/' + ${course.id}}" class="btn btn-sm btn-outline-danger" title="Xóa" onclick="return confirm('Bạn có chắc chắn muốn xóa khóa học này?');">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(courses)}">
                            <td colspan="6" class="text-center text-muted py-4">Chưa có dữ liệu khóa học.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
