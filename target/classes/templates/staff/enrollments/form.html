<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Ghi danh mới')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Ghi danh mới')}"></header>

<main class="main-content">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card border-0 shadow-sm" style="max-width:600px">
        <div class="card-body">
            <h5 class="mb-4"><i class="bi bi-journal-plus text-primary"></i> Tạo Ghi danh mới</h5>
            <form th:action="@{/staff/enrollments/save}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Học viên</label>
                    <select name="studentId" class="form-select" required>
                        <option value="">-- Chọn học viên --</option>
                        <option th:each="s : ${students}" th:value="${s.id}" th:text="${s.fullName + ' (ID: ' + s.id + ')'}">-</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Lớp học (đang mở)</label>
                    <select name="classId" class="form-select" required>
                        <option value="">-- Chọn lớp --</option>
                        <option th:each="c : ${classes}" th:value="${c.id}" th:text="${c.className + ' | ' + c.course?.courseName}">-</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Ghi danh</button>
                <a th:href="@{/staff/enrollments}" class="btn btn-outline-secondary ms-2">← Quay lại</a>
            </form>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
