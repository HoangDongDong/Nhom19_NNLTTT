<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý Hóa đơn')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Quản lý Hóa đơn')}"></header>

<main class="main-content">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show"><span th:text="${message}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show"><span th:text="${error}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>

    <h5 class="mb-3">Danh sách Hóa đơn</h5>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>ID</th><th>Học viên</th><th>Số tiền</th><th>Trạng thái</th><th>Ngày tạo</th><th>Hành động</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="inv : ${invoices}">
                            <td th:text="${inv.id}">-</td>
                            <td th:text="${inv.enrollment?.student?.fullName}">-</td>
                            <td th:text="${inv.totalAmount != null ? #numbers.formatDecimal(inv.totalAmount, 1, 'COMMA', 0, 'POINT') + ' đ' : '-'}">-</td>
                            <td><span class="badge" th:classappend="${inv.status == 'PAID' ? 'bg-success' : (inv.status == 'PENDING_CONFIRM' ? 'bg-warning text-dark' : 'bg-danger')}" th:text="${inv.status}">-</span></td>
                            <td th:text="${inv.createdAt}">-</td>
                            <td class="text-nowrap">
                                <div th:if="${inv.status == 'PENDING_CONFIRM'}" class="d-inline-flex gap-1">
                                    <form th:action="@{/staff/invoices/confirm}" method="post" class="m-0">
                                        <input type="hidden" name="invoiceId" th:value="${inv.id}">
                                        <input type="hidden" name="isApproved" value="true">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-success" title="Xác nhận đã nhận tiền"><i class="bi bi-check-circle"></i> Duyệt</button>
                                    </form>
                                    <form th:action="@{/staff/invoices/confirm}" method="post" class="m-0">
                                        <input type="hidden" name="invoiceId" th:value="${inv.id}">
                                        <input type="hidden" name="isApproved" value="false">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-danger" title="Từ chối / Chưa nhận được tiền"><i class="bi bi-x-circle"></i> Từ chối</button>
                                    </form>
                                </div>
                                <a th:href="@{'/report/invoice/' + ${inv.id}}" target="_blank" class="btn btn-sm btn-outline-secondary"><i class="bi bi-printer"></i> In HĐ</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(invoices)}">
                            <td colspan="6" class="text-center text-muted py-3">Chưa có hóa đơn nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
