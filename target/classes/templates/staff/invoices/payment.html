<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Thanh toán Hóa đơn')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Thanh toán Hóa đơn')}"></header>

<main class="main-content">
    <div class="card border-0 shadow-sm" style="max-width:600px">
        <div class="card-body">
            <h5 class="mb-4"><i class="bi bi-credit-card-2-front text-primary"></i> Xử lý Thanh toán</h5>

            <div class="mb-3 p-3 bg-light rounded">
                <div class="row">
                    <div class="col-6"><strong>Mã HĐ:</strong> <span th:text="${invoice.id}">-</span></div>
                    <div class="col-6"><strong>Học viên:</strong> <span th:text="${invoice.enrollment?.student?.fullName}">-</span></div>
                    <div class="col-6 mt-2"><strong>Số tiền:</strong> <span class="text-danger fw-bold" th:text="${invoice.totalAmount != null ? #numbers.formatDecimal(invoice.totalAmount, 1, 'COMMA', 0, 'POINT') + ' đ' : '-'}">-</span></div>
                    <div class="col-6 mt-2"><strong>Trạng thái:</strong> <span class="badge bg-warning text-dark" th:text="${invoice.status}">-</span></div>
                </div>
            </div>

            <form th:action="@{/staff/invoices/process}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="invoiceId" th:value="${invoice.id}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Mã giảm giá (không bắt buộc)</label>
                    <input type="text" name="discountCode" class="form-control" placeholder="VD: SUMMER20, ALUMNI, FREE">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Số tiền thanh toán</label>
                    <input type="number" name="amount" class="form-control" th:value="${invoice.totalAmount}" step="1000" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Phương thức</label>
                    <select name="paymentMethod" class="form-select" required>
                        <option th:each="m : ${paymentMethods}" th:value="${m.name()}" th:text="${m.name()}">-</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Xác nhận thanh toán</button>
                <a th:href="@{/staff/invoices}" class="btn btn-outline-secondary ms-2">← Quay lại</a>
            </form>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
