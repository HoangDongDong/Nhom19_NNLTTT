<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách học viên - EduLanguage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-info">
        <div class="container">
            <a class="navbar-brand" href="/home">EduLanguage</a>
            <a href="/home" class="btn btn-outline-light btn-sm">Trang chủ</a>
        </div>
    </nav>
    <main class="container my-4">
        <h4>Danh sách học viên</h4>
        <p class="text-muted">Dữ liệu lấy qua StudentService (mô hình 3 lớp: Controller → Service → Repository).</p>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Họ tên</th>
                        <th>Email</th>
                        <th>Điện thoại</th>
                        <th>Trạng thái</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${students}">
                        <td th:text="${s.id}">1</td>
                        <td th:text="${s.fullName}">Nguyễn Văn A</td>
                        <td th:text="${s.email}">a@email.com</td>
                        <td th:text="${s.phone}">091xxx</td>
                        <td><span class="badge" th:classappend="${s.status?.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'" th:text="${s.status}">ACTIVE</span></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="5" class="text-center text-muted">Chưa có học viên nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <a href="/home" class="btn btn-outline-secondary mt-2">← Về trang chủ</a>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
