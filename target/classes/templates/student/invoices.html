<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Học phí')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Học phí & Thanh toán')}"></header>
<main class="main-content">
    <h5 class="mb-3"><i class="bi bi-credit-card text-danger"></i> Hóa đơn & Lịch sử thanh toán</h5>
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>#</th><th>Lớp</th><th>Số tiền</th><th>Trạng thái</th><th>Ngày tạo</th><th>In</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="inv : ${invoices}">
                            <td th:text="${inv.id}">-</td>
                            <td th:text="${inv.enrollment?.clazz?.className}">-</td>
                            <td th:text="${inv.totalAmount != null ? #numbers.formatDecimal(inv.totalAmount, 1, 'COMMA', 0, 'POINT') + ' đ' : '-'}">-</td>
                            <td><span class="badge" th:classappend="${inv.status == 'PAID' ? 'bg-success' : (inv.status == 'PENDING_CONFIRM' ? 'bg-warning text-dark' : 'bg-danger')}" th:text="${inv.status}">-</span></td>
                            <td th:text="${inv.createdAt}">-</td>
                            <td class="text-nowrap">
                                <a th:if="${inv.status == 'UNPAID' || inv.status == 'REJECTED'}" th:href="@{'/student/invoices/payment/' + ${inv.id}}" class="btn btn-sm btn-primary"><i class="bi bi-credit-card"></i> Thanh toán</a>
                                <a th:href="@{'/report/invoice/' + ${inv.id}}" target="_blank" class="btn btn-sm btn-outline-secondary"><i class="bi bi-printer"></i> In HĐ</a>
                            </td>
                        </tr>
                        <tr th:if="${invoices == null or #lists.isEmpty(invoices)}">
                            <td colspan="6" class="text-center text-muted py-3">Chưa có hóa đơn nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
