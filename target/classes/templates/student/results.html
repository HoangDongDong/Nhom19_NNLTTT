<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Kết quả học tập')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Kết quả học tập')}"></header>
<main class="main-content">
    <h5 class="mb-3"><i class="bi bi-trophy text-warning"></i> Kết quả học tập</h5>

    <!-- Placement Test -->
    <div class="card border-0 shadow-sm mb-4" th:if="${lastResult != null}">
        <div class="card-header bg-white"><h6 class="mb-0">Kết quả Placement Test</h6></div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4"><strong>Điểm:</strong> <span class="fs-4 text-primary fw-bold" th:text="${lastResult.grade}">-</span></div>
                <div class="col-md-4"><strong>Trình độ xếp lớp:</strong> <span class="badge bg-info fs-6" th:text="${lastLevel}">-</span></div>
            </div>
        </div>
    </div>

    <!-- Khóa học & chứng chỉ -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white"><h6 class="mb-0">Khóa học đã đăng ký</h6></div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr><th>Lớp</th><th>Khóa học</th><th>Trạng thái</th><th>Chứng chỉ</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${enrollments}">
                            <td th:text="${e.clazz?.className}">-</td>
                            <td th:text="${e.clazz?.course?.courseName}">-</td>
                            <td><span class="badge" th:classappend="${e.status == 'ACTIVE' ? 'bg-success' : 'bg-warning text-dark'}" th:text="${e.status}">-</span></td>
                            <td>
                                <a th:if="${e.status == 'ACTIVE'}" th:href="@{'/report/certificate/' + ${e.id}}" target="_blank" class="btn btn-sm btn-outline-success"><i class="bi bi-award"></i> Xem chứng chỉ</a>
                                <span th:unless="${e.status == 'ACTIVE'}" class="text-muted">-</span>
                            </td>
                        </tr>
                        <tr th:if="${enrollments == null or #lists.isEmpty(enrollments)}">
                            <td colspan="4" class="text-center text-muted py-3">Chưa có kết quả nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
