<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Lớp phụ trách')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Lớp phụ trách')}"></header>
<main class="main-content">
    <h5 class="mb-3"><i class="bi bi-people text-primary"></i> Danh sách lớp phụ trách</h5>
    <div class="row g-3">
        <div class="col-md-6" th:each="c : ${myClasses}">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h6 th:text="${c.className}">Lớp A1</h6>
                    <p class="small text-muted mb-1">Khóa: <span th:text="${c.course?.courseName}">-</span></p>
                    <p class="small text-muted mb-1">Phòng: <span th:text="${c.room != null ? c.room.roomName : 'Chưa xếp'}">-</span></p>
                    <p class="small text-muted mb-0">Sĩ số tối đa: <span th:text="${c.maxStudent}">-</span></p>
                    <span class="badge mt-2" th:classappend="${c.status?.name() == 'ACTIVE' ? 'bg-success' : 'bg-secondary'}" th:text="${c.status}">-</span>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${myClasses == null or #lists.isEmpty(myClasses)}">
            <div class="alert alert-info">Hiện chưa được phân công lớp nào.</div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
