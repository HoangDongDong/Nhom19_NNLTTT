<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Teacher Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Teacher Dashboard')}"></header>

<main class="main-content">
    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card stat-card">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="icon-box bg-primary bg-opacity-10 text-primary"><i class="bi bi-easel2"></i></div>
                    <div>
                        <div class="text-muted small">Lớp đang phụ trách</div>
                        <div class="fw-bold fs-4" th:text="${classCount != null ? classCount : 0}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6" th:if="${teacher != null}">
            <div class="card stat-card">
                <div class="card-body">
                    <div class="text-muted small">Giảng viên</div>
                    <div class="fw-bold fs-5" th:text="${teacher.fullName}">-</div>
                    <small class="text-muted" th:text="${teacher.email}">email@example.com</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Danh sách lớp -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white"><h6 class="mb-0"><i class="bi bi-calendar2-week text-primary"></i> Lớp phụ trách</h6></div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Tên lớp</th><th>Khóa học</th><th>Ngày bắt đầu</th><th>Ngày kết thúc</th><th>Sĩ số tối đa</th><th>Trạng thái</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${myClasses}">
                            <td th:text="${c.className}">-</td>
                            <td th:text="${c.course?.courseName}">-</td>
                            <td th:text="${c.startDate}">-</td>
                            <td th:text="${c.endDate}">-</td>
                            <td th:text="${c.maxStudent}">-</td>
                            <td><span class="badge" th:classappend="${c.status?.name() == 'ACTIVE' ? 'bg-success' : 'bg-secondary'}" th:text="${c.status}">-</span></td>
                        </tr>
                        <tr th:if="${myClasses == null or #lists.isEmpty(myClasses)}">
                            <td colspan="6" class="text-center text-muted py-3">Hiện chưa được phân công lớp nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
