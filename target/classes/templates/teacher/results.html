<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Nhập Điểm Cuối Kỳ')}"></head>
<body>
<nav th:replace="~{fragments/layout :: sidebar}"></nav>
<header th:replace="~{fragments/layout :: header('Nhập Điểm & Kết Quả')}"></header>

<main class="main-content">
    <div class="row">
        <div class="col-12">
            <!-- Filter -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title text-primary"><i class="bi bi-mortarboard"></i> Chọn Lớp để Nhập điểm</h5>
                    <form th:action="@{/teacher/results}" method="get" class="row g-3 align-items-end mt-2">
                        <div class="col-md-8">
                            <label class="form-label">Chọn Lớp học <span class="text-danger">*</span></label>
                            <select name="classId" class="form-select" required>
                                <option value="">-- Chọn Lớp đang giảng dạy --</option>
                                <option th:each="c : ${myClasses}" th:value="${c.id}" 
                                        th:selected="${c.id == selectedClassId}"
                                        th:text="${c.className} + ' - ' + ${c.course.courseName}"></option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search"></i> Tải danh sách</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Thông báo -->
            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle"></i> <span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Input Form -->
            <div th:if="${selectedClassId != null}" class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-bold"><i class="bi bi-pencil-square text-warning"></i> Bảng Nhập Điểm Mới</span>
                    <small class="text-muted">Điền Điểm, Xếp loại, Nhận xét cho từng Học viên</small>
                </div>
                <div class="card-body p-0">
                    <form th:action="@{/teacher/results/submit}" method="post">
                        <input type="hidden" name="classId" th:value="${selectedClassId}"/>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                <tr>
                                    <th class="ps-4" style="width:5%">#</th>
                                    <th style="width:20%">Họ và tên</th>
                                    <th style="width:15%">Điểm (0 - 10)</th>
                                    <th style="width:15%">Xếp loại</th>
                                    <th>Nhận xét</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="enrollment, iter : ${enrollments}">
                                    <td class="ps-4 text-muted" th:text="${iter.count}"></td>
                                    <td class="fw-bold" th:text="${enrollment.student.fullName}"></td>
                                    <td>
                                        <input type="number" class="form-control" step="0.1" min="0" max="10" 
                                               th:name="'score_' + ${enrollment.student.id}" placeholder="8.5" required>
                                    </td>
                                    <td>
                                        <select class="form-select" th:name="'grade_' + ${enrollment.student.id}">
                                            <option value="">-- Chọn --</option>
                                            <option value="Excellent">Xuất sắc</option>
                                            <option value="Good">Giỏi</option>
                                            <option value="Average">Khá</option>
                                            <option value="Pass">Trung bình</option>
                                            <option value="Fail">Không đạt</option>
                                        </select>
                                    </td>
                                    <td>
                                        <input type="text" class="form-control" 
                                               th:name="'comment_' + ${enrollment.student.id}" placeholder="Ghi chú...">
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(enrollments)}">
                                    <td colspan="5" class="text-center py-4 text-muted">Lớp này chưa có học viên ghi danh.</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="card-footer bg-white text-end py-3" th:if="${!#lists.isEmpty(enrollments)}">
                            <button type="submit" class="btn btn-warning text-white"><i class="bi bi-save"></i> Lưu Kết Quả</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- =============== LỊCH SỬ KẾT QUẢ ĐÃ LƯU =============== -->
            <div th:if="${selectedClassId != null && existingResults != null && !existingResults.isEmpty()}" class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0"><i class="bi bi-clock-history text-primary"></i> Kết quả đã lưu của Lớp này</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover align-middle mb-0">
                            <thead class="bg-light">
                            <tr>
                                <th class="ps-4">#</th>
                                <th>Học viên</th>
                                <th class="text-center">Điểm</th>
                                <th class="text-center">Xếp loại</th>
                                <th>Nhận xét</th>
                                <th>Ngày nhập</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="result, iter : ${existingResults}">
                                <td class="ps-4 text-muted" th:text="${iter.count}"></td>
                                <td class="fw-bold" th:text="${result.student.fullName}"></td>
                                <td class="text-center">
                                    <span class="badge rounded-pill"
                                          th:classappend="${result.score >= 8 ? 'bg-success' : (result.score >= 5 ? 'bg-warning text-dark' : 'bg-danger')}"
                                          th:text="${result.score}"></span>
                                </td>
                                <td class="text-center">
                                    <span th:text="${result.grade}" class="fw-semibold"></span>
                                </td>
                                <td th:text="${result.comment}"></td>
                                <td th:text="${#temporals.format(result.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div th:if="${selectedClassId == null}" class="text-center py-5 text-muted">
                <i class="bi bi-clipboard2-data" style="font-size: 3rem;"></i>
                <p class="mt-2">Vui lòng chọn Lớp để bắt đầu nhập điểm cuối kỳ.</p>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
